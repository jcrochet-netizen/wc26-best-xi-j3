<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Monte o melhor XI da 3ª rodada da Copa do Mundo 2026</title>
<meta name="description" content="Escolha seu esquema tático e monte o melhor XI da 3ª rodada da Copa do Mundo 2026 com jogadores de todas as seleções. Prévia ao vivo no campo. Compartilhe sua escalação!">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
/* ── Reset & Variables ──────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--card:#f5f5f5;--card-hover:#eaeaea;--card-selected:#fde8e8;
  --accent:#e30613;--accent-dark:#b8050f;--text:#1a1a1a;--text-muted:#777;
  --pitch-green:#2d6a30;--pitch-dark:#1e5420;--pitch-line:rgba(255,255,255,.35);
  --pos-gk:#1e88e5;--pos-def:#1a1a1a;--pos-mid:#f9a825;--pos-att:#c62828;
  --done-bg:#d4edda;--done-text:#1e7e34;--accent-light:#ff1a2a;
  --radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.4}

/* ── Widget Container (2 columns: selection | live pitch) ───────── */
#squad-widget{display:flex;gap:20px;width:100%;max-width:820px;margin:0 auto;padding:20px;align-items:flex-start}
.selector-panel{flex:1;min-width:0}
.pitch-panel{width:360px;flex-shrink:0;position:sticky;top:20px}

/* ── Formation selector ─────────────────────────────────────────── */
.formation-bar{margin-bottom:16px}
.formation-label{font-size:.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.formation-options{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.formation-btn{padding:7px 6px;background:var(--card);border:2px solid transparent;border-radius:var(--radius);cursor:pointer;transition:all .2s;font-family:inherit;font-size:.8rem;font-weight:700;color:var(--text);letter-spacing:.2px;white-space:nowrap}
.formation-btn:hover:not(.active){background:var(--card-hover)}
.formation-btn.active{background:var(--card-selected);border-color:var(--accent);color:var(--accent-light)}
.place-hint{font-size:.72rem;color:var(--text-muted);font-style:italic;margin-bottom:14px;line-height:1.4}

/* ── Progress ───────────────────────────────────────────────────── */
.progress{display:flex;align-items:center;gap:14px;margin-bottom:18px;font-size:1.05rem;color:var(--text-muted)}
.progress-bar{flex:1;height:14px;background:var(--card);border-radius:7px;overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-dark));transition:width .3s}
.progress-text{font-weight:700;color:var(--text);white-space:nowrap;font-size:1.05rem}
.progress-text .done{color:var(--accent-light)}

/* ── Player Cards Grid (single pool, grouped by position) ───────── */
.pos-group{margin-bottom:16px}
.pos-group:last-child{margin-bottom:0}
.pos-group-label{font-size:.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.pos-group-label::before{content:"";width:16px;height:4px;border-radius:2px;background:var(--lbl)}
.pos-group-count{margin-left:auto;font-weight:700;color:var(--text-muted)}
.pos-group-count.done{color:var(--done-text)}
/* Liste des joueurs : 2 colonnes fixes + ascenseur sur la partie gauche */
.players-col{max-height:520px;overflow-y:auto;overflow-x:hidden;padding-right:8px;margin-bottom:14px}
.players-col::-webkit-scrollbar{width:8px}
.players-col::-webkit-scrollbar-track{background:#f0f0f0;border-radius:4px}
.players-col::-webkit-scrollbar-thumb{background:#cfcfcf;border-radius:4px}
.players-col::-webkit-scrollbar-thumb:hover{background:#b5b5b5}
.player-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.player-card{display:flex;align-items:center;gap:6px;background:var(--card);border:2px solid transparent;border-radius:var(--radius);padding:6px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;min-width:0}
.player-card:hover:not(.disabled){border-color:var(--accent);background:var(--card-hover)}
.player-card.selected{border-color:var(--accent);background:var(--card-selected)}
.player-card.disabled{opacity:.35;pointer-events:none}
.player-card .initials{width:26px;height:26px;border-radius:50%;border:2px solid rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:.2px}
.player-card .initials.photo{background-size:cover;background-position:center top;background-repeat:no-repeat;background-color:#dfe3e8}
.player-card .info{flex:1;min-width:0;overflow:hidden}
.player-card .name{font-size:.72rem;font-weight:600;line-height:1.25}
.player-card .name span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-card .name .first{font-weight:400;color:var(--text-muted);font-size:.7rem}
.player-card .check{position:absolute;top:5px;right:5px;width:18px;height:18px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;font-size:.65rem;font-weight:700}
.player-card.selected .check{display:flex}

/* ── Pitch ──────────────────────────────────────────────────────── */
.pitch-container{background:var(--card);border-radius:12px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.pitch-title{text-align:center;font-size:.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;line-height:1.4}
.pitch-title strong{display:block;color:var(--accent-light);font-size:1rem;letter-spacing:2px;margin-top:2px}
.pitch{position:relative;width:100%;padding-bottom:150%;background:linear-gradient(180deg,var(--pitch-dark) 0%,var(--pitch-green) 22%,var(--pitch-green) 78%,var(--pitch-dark) 100%);border-radius:8px;overflow:hidden;border:2px solid var(--pitch-line)}

/* Pitch lines */
.pitch-lines{position:absolute;inset:0}
.pitch-lines .halfway{position:absolute;top:50%;left:5%;right:5%;height:0;border-top:2px solid var(--pitch-line)}
.pitch-lines .center-circle{position:absolute;top:50%;left:50%;width:22%;padding-bottom:22%;border-radius:50%;border:2px solid var(--pitch-line);transform:translate(-50%,-50%)}
.pitch-lines .center-dot{position:absolute;top:50%;left:50%;width:5px;height:5px;border-radius:50%;background:var(--pitch-line);transform:translate(-50%,-50%)}
.pitch-lines .box-top{position:absolute;top:0;left:22%;right:22%;height:14%;border:2px solid var(--pitch-line);border-top:none}
.pitch-lines .box-bottom{position:absolute;bottom:0;left:22%;right:22%;height:14%;border:2px solid var(--pitch-line);border-bottom:none}

/* Pitch position lines (rows of dots) */
.pitch-zones{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:4% 4%}
.pitch-zone{display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:12px;min-height:0;flex:1}
.pitch-zone.gk{flex:0 0 auto}
.pitch-zone.spread{justify-content:space-between;padding:0 4%}

/* Pitch dots (compact so a 5-player line — e.g. 5-4-1 — fits the pitch) */
.pitch-dot{display:flex;flex-direction:column;align-items:center;width:50px;transition:transform .2s}
.pitch-dot .dot-circle{width:48px;height:48px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:800;color:#fff;letter-spacing:.3px;box-shadow:0 2px 6px rgba(0,0,0,.45)}
.pitch-dot .dot-name{font-size:.66rem;font-weight:600;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);margin-top:3px;line-height:1.05;text-align:center;white-space:nowrap}
.pitch-dot .dot-name.long{font-size:.56rem}
.pitch-dot{cursor:pointer}
.pitch-dot.empty .dot-circle{border:2px dashed rgba(255,255,255,.45);background:rgba(255,255,255,.08)!important;color:rgba(255,255,255,.45)}
.pitch-dot.empty .dot-name{color:rgba(255,255,255,.4)}
.pitch-dot.empty.active .dot-circle{border:2px solid var(--accent-light);background:rgba(227,6,19,.25)!important;color:#fff;box-shadow:0 0 0 3px rgba(227,6,19,.5)}
.pitch-dot.empty.active .dot-name{color:var(--accent-light)}

/* ── Share Section ──────────────────────────────────────────────── */
.share-section{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.share-section.locked{opacity:.5;pointer-events:none}
.share-hint{text-align:center;font-size:.72rem;color:var(--text-muted);font-style:italic}
.share-hint.hidden{display:none}
.share-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.share-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:11px 6px;border:none;border-radius:var(--radius);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;color:#fff;font-family:inherit}
.share-btn:hover{opacity:.9;transform:translateY(-1px)}
.share-btn.x{background:#000}
.share-btn.fb{background:#1877f2}
.share-btn.wa{background:#25d366}
.share-btn.ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)}
.share-btn.dl{background:var(--accent);grid-column:1 / -1;padding:13px;font-size:.9rem}

/* ── Reset Button ───────────────────────────────────────────────── */
.reset-btn{display:block;width:100%;margin-top:14px;padding:9px;background:transparent;color:var(--text-muted);border:1px solid #ccc;border-radius:var(--radius);font-size:.78rem;cursor:pointer;transition:all .2s;font-family:inherit}
.reset-btn:hover{border-color:var(--accent-light);color:var(--accent-light)}

/* ── Responsive ─────────────────────────────────────────────────── */
/* Terrain À CÔTÉ de la sélection tant que c'est possible : la colonne du
   terrain ne passe SOUS la sélection que sur mobile (≤ 600px). */
@media(max-width:600px){
  #squad-widget{flex-direction:column;padding:12px;gap:16px}
  .pitch-panel{width:100%;position:static}
  .pitch-panel .pitch-container{max-width:400px;margin:0 auto}
  .pitch{padding-bottom:120%}
  /* Liste pleine hauteur (pas d'ascenseur) quand le terrain passe dessous */
  .players-col{max-height:none;overflow:visible;padding-right:0;margin-bottom:0}
  .player-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .player-card{padding:7px;gap:7px}
  .player-card .initials{width:36px;height:36px;font-size:.74rem}
  .player-card .name{font-size:.72rem}
  .pitch-dot{width:54px}
  .pitch-dot .dot-circle{width:52px;height:52px;font-size:.78rem}
  .pitch-dot .dot-name{font-size:.65rem}
}
@media(max-width:400px){
  #squad-widget{padding:8px}
  .player-card{padding:6px;gap:6px}
  .player-card .initials{width:32px;height:32px;font-size:.7rem}
  .player-card .name{font-size:.68rem}
  .player-card .name .first{font-size:.62rem}
}
</style>
</head>
<body>

<div id="squad-widget">

  <!-- ═══ LEFT: Selection ═══ -->
  <div class="selector-panel">

    <!-- Formation selector -->
    <div class="formation-bar">
      <div class="formation-label">Esquema tático</div>
      <div class="formation-options" id="formationOptions"></div>
    </div>

    <!-- Progress -->
    <div class="progress">
      <div class="progress-text"><span class="done" id="totalSelected">0</span> / <span id="totalRequired">11</span> titulares</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="place-hint">Dica: selecione do goleiro ao ataque, da direita para a esquerda. Você pode clicar em uma posição no campo e depois em um jogador para posicioná-lo exatamente onde quiser (mesmo fora da posição).</div>

    <!-- Single pool, grouped by position (non-clickable labels) -->
    <div class="players-col" id="playersCol"></div>

    <button class="reset-btn" onclick="resetAll()">↺ Reiniciar</button>
  </div>

  <!-- ═══ RIGHT: Live pitch + Share ═══ -->
  <div class="pitch-panel">
    <div class="pitch-container" id="pitchContainer">
      <div class="pitch-title"><span id="pitchTitleText">Meu XI da fase de grupos</span><strong id="pitchFormationLabel">4-3-3</strong></div>
      <div class="pitch" id="pitch">
        <div class="pitch-lines">
          <div class="halfway"></div>
          <div class="center-circle"></div>
          <div class="center-dot"></div>
          <div class="box-top"></div>
          <div class="box-bottom"></div>
        </div>
        <div class="pitch-zones" id="pitchZones"></div>
      </div>
    </div>

    <div class="share-section locked" id="shareSection">
      <div class="share-hint" id="shareHint">Complete seu XI para compartilhar</div>
      <button class="share-btn dl" onclick="downloadImage()">📥 Baixar imagem</button>
      <div class="share-buttons">
        <button class="share-btn x"  onclick="shareOn('x')">𝕏 Compartilhar</button>
        <button class="share-btn fb" onclick="shareOn('facebook')">Facebook</button>
        <button class="share-btn wa" onclick="shareOn('whatsapp')">WhatsApp</button>
        <button class="share-btn ig" onclick="shareOn('instagram')">Instagram</button>
      </div>
    </div>
  </div>

</div>

/* ═══════════════════════════════════════════════════════════════════
   🚫 FIN DU CONFIG — Code partagé ci-dessous
   ═══════════════════════════════════════════════════════════════════ */

const POSITIONS = ["gk","def","mid","att"];
const POS_COLOR = { gk:"var(--pos-gk)", def:"var(--pos-def)", mid:"var(--pos-mid)", att:"var(--pos-att)" };
const POS_LABEL_FULL = { gk:I18N.posGkFull, def:I18N.posDefFull, mid:I18N.posMidFull, att:I18N.posAttFull };
const FORMATION_KEYS = Object.keys(FORMATIONS);

const state = {
  formation: FORMATION_KEYS[0],
  slots: [],     // un emplacement du terrain par index : objet {player,pos} ou null
  active: null   // index de l'emplacement ciblé pour le prochain placement
};

/* Liste ordonnée des emplacements du schéma courant (haut → bas, gauche → droite). */
function formationSlots() {
  const slots = [];
  FORMATIONS[state.formation].lines.forEach(line => {
    for (let i = 0; i < line.count; i++) slots.push({ pos: line.pos, spread: !!line.spread });
  });
  return slots;
}

/* (Re)construit le tableau des emplacements en conservant les joueurs déjà placés. */
function rebuildSlots() {
  const placed = (state.slots || []).filter(Boolean); // joueurs déjà placés, dans l'ordre
  state.slots = formationSlots().map(() => null);
  const order = fillOrder();
  placed.forEach((item, i) => { if (i < order.length) state.slots[order[i]] = item; });
  state.active = firstEmptySlot(); // on cible d'emblée le 1er emplacement libre (le gardien)
}

function totalSelected() {
  return state.slots.filter(Boolean).length;
}

function placedGk() {
  return state.slots.some(s => s && s.pos === "gk");
}

function isPlaced(id) {
  return state.slots.some(s => s && s.player.id === id);
}

/* Ordre de remplissage automatique : on commence par le gardien (ligne du bas),
   puis on remonte ligne par ligne, chaque ligne de DROITE à GAUCHE.
   Renvoie la liste des index d'emplacements dans cet ordre. */
function fillOrder() {
  const lines = FORMATIONS[state.formation].lines;
  const perLine = [];
  let idx = 0;
  lines.forEach(line => {
    const arr = [];
    for (let i = 0; i < line.count; i++) arr.push(idx++);
    perLine.push(arr);
  });
  const order = [];
  for (let li = perLine.length - 1; li >= 0; li--) {  // bas (gardien) → haut (attaque)
    order.push(...perLine[li].slice().reverse());     // droite → gauche
  }
  return order;
}

function firstEmptySlot() {
  const order = fillOrder();
  for (const i of order) if (state.slots[i] === null) return i;
  return -1;
}

/* Emplacement cible : celui choisi sur le terrain s'il est libre, sinon le prochain
   de l'ordre de remplissage (gardien d'abord, puis chaque ligne de droite à gauche). */
function targetSlotFor() {
  if (state.active != null && state.active >= 0 && state.slots[state.active] === null) {
    return state.active;
  }
  return firstEmptySlot();
}

/* La seule règle : 11 titulaires placés (et un seul gardien, géré à la sélection). */
function isSquadValid() {
  return totalSelected() === SQUAD_TOTAL;
}

/* ── Name helpers ────────────────────────────────────────────────── */
function getInitials(name) {
  const parts = name.replace(/[-']/g, " ").trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}

function getLastName(name) {
  const parts = name.trim().split(/\s+/);
  return parts[parts.length - 1];
}

function getFirstName(name) {
  const parts = name.trim().split(/\s+/);
  parts.pop();
  return parts.join(" ");
}

/* ═══════════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════════ */
function init() {
  document.documentElement.lang = COUNTRY.htmlLang;
  document.title = I18N.pageTitle;
  document.getElementById("pitchTitleText").textContent = I18N.pitchTitle;
  rebuildSlots();
  renderFormationOptions();
  renderPlayers();
  renderPitch();
  updateProgress();
  updateShareState();
}

/* ── Formation selector ──────────────────────────────────────────── */
function renderFormationOptions() {
  const el = document.getElementById("formationOptions");
  el.innerHTML = FORMATION_KEYS.map(key => {
    const cls = key === state.formation ? "active" : "";
    return `<button class="formation-btn ${cls}" onclick="changeFormation('${key}')">${FORMATIONS[key].label}</button>`;
  }).join("");
}

function changeFormation(key) {
  if (!FORMATIONS[key] || key === state.formation) return;
  state.formation = key;
  state.slots = [];   // changer de schéma remet la sélection à zéro
  rebuildSlots();
  renderFormationOptions();
  updateAllCards();
  renderPitch();
  updateProgress();
  updateShareState();
}

/* ── Player list (single pool grouped by position) ───────────────── */
function renderPlayers() {
  const el = document.getElementById("playersCol");
  el.innerHTML = POSITIONS.map(pos => {
    const cards = PLAYERS[pos].map(p => cardHtml(pos, p)).join("");
    return `<div class="pos-group">
      <div class="pos-group-label" style="--lbl:${POS_COLOR[pos]}">
        <span>${POS_LABEL_FULL[pos]}</span>
        <span class="pos-group-count" id="count-${pos}"></span>
      </div>
      <div class="player-grid">${cards}</div>
    </div>`;
  }).join("");
  updateAllCards();
}

function cardHtml(pos, p) {
  const firstName = getFirstName(p.name);
  const lastName = getLastName(p.name);
  const av = p.photo
    ? `class="initials photo" style="background-image:url('${p.photo}')"`
    : `class="initials" style="background:${POS_COLOR[pos]}"`;
  return `<div class="player-card" data-pos="${pos}" data-id="${p.id}" onclick="selectPlayer('${pos}',${p.id})">
    <div ${av}>${p.photo ? "" : getInitials(p.name)}</div>
    <div class="info"><div class="name">${firstName ? `<span class="first">${firstName}</span>` : ""}<span>${lastName}</span></div></div>
    <div class="check">✓</div>
  </div>`;
}

function selectPlayer(pos, id) {
  const player = PLAYERS[pos].find(p => p.id === id);
  if (!player) return;

  const slotIdx = state.slots.findIndex(s => s && s.player.id === id);
  if (slotIdx >= 0) {
    // Déjà sur le terrain → on le retire (et on cible son emplacement libéré)
    state.slots[slotIdx] = null;
    state.active = slotIdx;
  } else {
    if (pos === "gk" && placedGk()) return;   // un seul gardien autorisé
    const target = targetSlotFor();
    if (target < 0) return;                    // terrain complet
    state.slots[target] = { player, pos };     // placement explicite, aucun réarrangement
    state.active = firstEmptySlot();           // -1 si complet
  }

  updateAllCards();
  renderPitch();
  updateProgress();
  updateShareState();
}

function updateAllCards() {
  const full = totalSelected() >= SQUAD_TOTAL;
  const gkPlaced = placedGk();
  POSITIONS.forEach(pos => {
    const n = state.slots.filter(s => s && s.pos === pos).length;
    const c = document.getElementById("count-" + pos);
    if (c) {
      c.textContent = n > 0 ? String(n) : "";
      c.classList.toggle("done", n > 0);
    }
  });
  document.querySelectorAll(".player-card").forEach(card => {
    const pos = card.dataset.pos;
    const id = parseInt(card.dataset.id);
    const placed = isPlaced(id);
    card.classList.toggle("selected", placed);
    card.classList.toggle("disabled", !placed && (full || (pos === "gk" && gkPlaced)));
  });
}

/* ── Pitch rendering (uses the chosen formation layout) ──────────── */
function renderPitch() {
  const f = FORMATIONS[state.formation];
  document.getElementById("pitchFormationLabel").textContent = f.label;
  const container = document.getElementById("pitchZones");

  // Chaque pastille correspond à un emplacement fixe (index global).
  // Le joueur reste exactement là où il a été placé : aucun tri, aucun réarrangement.
  let idx = 0;
  container.innerHTML = f.lines.map(line => {
    let dots = "";
    for (let i = 0; i < line.count; i++) {
      const slotIndex = idx++;
      const item = state.slots[slotIndex];
      dots += item ? filledDot(item.player, item.pos, slotIndex)
                   : emptyDot(line.pos, slotIndex);
    }
    const _g = {2:40,3:40,4:25}[line.count];
    const _gs = (_g != null && !line.spread) ? ` style="gap:${_g}px"` : "";
    return `<div class="pitch-zone ${line.pos}${line.spread ? " spread" : ""}"${_gs}>${dots}</div>`;
  }).join("");
}

function filledDot(player, pos, slotIndex) {
  const lastName = getLastName(player.name);
  const _isComp = lastName.includes("-");
  const _nm = _isComp ? lastName.replace(/-/g, "-<br>") : lastName;
  const _nmCls = ""; // règle "nom long = plus petit" désactivée (écarts désormais plus grands)
  const initials = getInitials(player.name);
  const circleStyle = player.photo
    ? `background-image:url('${player.photo}');background-size:cover;background-position:center top`
    : `background:${PITCH_DOT_COLOR}`;
  return `<div class="pitch-dot" data-pos="${pos}" onclick="clickSlot(${slotIndex})" title="Retirer ${player.name}">
    <div class="dot-circle" style="${circleStyle}">${player.photo ? "" : initials}</div>
    <div class="dot-name${_nmCls}">${_nm}</div>
  </div>`;
}

function emptyDot(pos, slotIndex) {
  const active = state.active === slotIndex ? " active" : "";
  return `<div class="pitch-dot empty${active}" data-pos="${pos}" onclick="clickSlot(${slotIndex})">
    <div class="dot-circle">+</div>
    <div class="dot-name">—</div>
  </div>`;
}

/* Clic sur un emplacement du terrain :
   - occupé → retire le joueur et cible l'emplacement libéré ;
   - vide   → le cible pour le prochain joueur (ou le décible si on reclique le même). */
function clickSlot(i) {
  if (state.slots[i]) {
    state.slots[i] = null;
    state.active = i;
  } else {
    state.active = (state.active === i) ? null : i;
  }
  updateAllCards();
  renderPitch();
  updateProgress();
  updateShareState();
}

/* ── Progress + share state ──────────────────────────────────────── */
function updateProgress() {
  const total = totalSelected();
  document.getElementById("totalSelected").textContent = total;
  document.getElementById("totalRequired").textContent = SQUAD_TOTAL;
  document.getElementById("progressFill").style.width = (total / SQUAD_TOTAL * 100) + "%";
}

function updateShareState() {
  const ready = isSquadValid();
  document.getElementById("shareSection").classList.toggle("locked", !ready);
  document.getElementById("shareHint").classList.toggle("hidden", ready);
}

/* ── Reset ──────────────────────────────────────────────────────── */
function resetAll() {
  state.formation = FORMATION_KEYS[0];
  state.slots = [];
  rebuildSlots();
  renderFormationOptions();
  updateAllCards();
  renderPitch();
  updateProgress();
  updateShareState();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ═══════════════════════════════════════════════════════════════════
   PARENT URL + IFRAME RESIZE (postMessage)
   ═══════════════════════════════════════════════════════════════════ */
let _parentUrl = null;

function getShareUrl() {
  if (_parentUrl) return _parentUrl;
  try {
    if (window.top && window.top !== window.self && window.top.location.href) {
      return window.top.location.href;
    }
  } catch (e) {
    if (document.referrer) return document.referrer;
  }
  return window.location.href;
}

window.addEventListener('message', (e) => {
  if (e.source !== window.parent) return; // n'accepte l'URL que du parent direct
  if (e.data && (e.data.type === 'wc2026-url' || e.data.type === 'xilegende-url') && e.data.url) {
    _parentUrl = e.data.url;
  }
});

function setupAutoResize() {
  if (window.parent === window) return;
  // Cible l'origine du parent (déduite du referrer), repli sur "*" si indisponible
  let PARENT_ORIGIN = '*';
  try { if (document.referrer) PARENT_ORIGIN = new URL(document.referrer).origin; } catch (e) {}
  const postHeight = () => {
    const widget = document.getElementById('squad-widget');
    const h = widget
      ? Math.ceil(widget.getBoundingClientRect().bottom + window.scrollY)
      : Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    window.parent.postMessage({ type: 'wc2026-resize', height: h }, PARENT_ORIGIN);
    window.parent.postMessage({ type: 'xilegende-resize', height: h }, PARENT_ORIGIN);
  };
  postHeight();
  window.addEventListener('resize', postHeight);
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(postHeight).observe(document.body);
  }
  window.parent.postMessage({ type: 'wc2026-getUrl' }, PARENT_ORIGIN);
  window.parent.postMessage({ type: 'xilegende-getUrl' }, PARENT_ORIGIN);
}

/* ═══════════════════════════════════════════════════════════════════
   IMAGE GENERATION & SHARE
   ═══════════════════════════════════════════════════════════════════ */
async function generateImage() {
  const pitchEl = document.getElementById("pitchContainer");
  await new Promise(r => requestAnimationFrame(r));
  const canvas = await html2canvas(pitchEl, {
    backgroundColor: "#f5f5f5",
    scale: 4,
    useCORS: true,
    allowTaint: true,
    logging: false,
    imageTimeout: 15000
  });
  return new Promise((resolve, reject) => {
    canvas.toBlob(b => {
      if (b) resolve(b);
      else reject(new Error("Canvas non exportable."));
    }, "image/png");
  });
}

async function downloadImage() {
  try {
    const blob = await generateImage();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = I18N.downloadFilename;
    a.click();
  } catch (e) {
    console.error("html2canvas error:", e);
    const msg = (location.protocol === "file:")
      ? I18N.errorFileProto
      : I18N.errorPrefix + (e.message || e);
    alert(msg);
  }
}

function shareOn(platform) {
  const text = encodeURIComponent(I18N.shareText);
  const url = encodeURIComponent(getShareUrl());
  const urls = {
    x: `https://twitter.com/intent/tweet?text=${text}&url=${url}`,
    facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${text}`,
    whatsapp: `https://wa.me/?text=${text}%20${url}`
  };
  if (platform === "instagram") {
    downloadImage();
    alert(I18N.instagramAlert);
    return;
  }
  if (urls[platform]) window.open(urls[platform], "_blank", "width=600,height=400");
}

/* ── Start ── */
init();
setupAutoResize();
</script>
